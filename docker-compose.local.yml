services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: mem-local-postgres
    environment:
      POSTGRES_DB: mem_local
      POSTGRES_USER: mem_local
      POSTGRES_PASSWORD: mem_local
    ports:
      - "54329:5432"
    volumes:
      - mem_local_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mem_local -d mem_local"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: mem-local-redis
    ports:
      - "6380:6379"
    volumes:
      - mem_local_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mem_local_pgdata:
  mem_local_redis:
